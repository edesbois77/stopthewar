  <style>
    :root {
      --cream: #F2EDE4;
      --ink: #1a1a1a;
      --red: #C41E1E;
      --red-dark: #7a1010;
      --red-hover: #d42020;
      --muted: #888;
      --border: #bbb;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      font-family: 'Barlow Condensed', sans-serif;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.5rem 3rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(0,0,0,0.04) 28px, rgba(0,0,0,0.04) 29px),
        repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(0,0,0,0.03) 28px, rgba(0,0,0,0.03) 29px);
      pointer-events: none;
      z-index: 0;
    }

    /* Language switcher */
    .lang-switcher {
      position: fixed;
      top: 12px;
      right: 14px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .lang-select {
      font-family: 'Special Elite', serif;
      font-size: 11px;
      letter-spacing: 0.08em;
      background: var(--ink);
      color: var(--cream);
      border: none;
      padding: 5px 8px;
      cursor: pointer;
      border-radius: 2px;
      appearance: none;
      -webkit-appearance: none;
    }

    .lang-select:focus { outline: 2px solid var(--red); }

    /* Butterflies */
    .butterfly-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .butterfly {
      position: absolute;
      animation: flyUp var(--dur) ease-out forwards;
    }

    .butterfly svg {
      width: 100%;
      height: 100%;
      animation: flutter var(--flap) ease-in-out infinite alternate;
      transform-origin: center;
    }

    @keyframes flyUp {
      0%   { transform: translate(0,0) rotate(var(--rot)); opacity: 1; }
      60%  { opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot2)); opacity: 0; }
    }

    @keyframes flutter {
      0%   { transform: scaleX(1); }
      100% { transform: scaleX(0.25); }
    }

    .wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .masthead {
      font-family: 'Special Elite', serif;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #444;
      border-top: 2.5px solid var(--ink);
      border-bottom: 1px solid var(--ink);
      padding: 5px 0;
      width: 100%;
      text-align: center;
      margin-bottom: 1.2rem;
    }

    .headline {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(2rem, 6.5vw, 4rem);
      line-height: 1;
      color: var(--ink);
      text-align: center;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
      white-space: nowrap;
    }

    .headline .red { color: var(--red); }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 0.6rem 0 1rem;
    }

    .subhead {
      font-family: 'Special Elite', serif;
      font-size: 13px;
      color: #555;
      text-align: center;
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .btn-wrap { margin-bottom: 0.6rem; position: relative; }

    .big-btn {
      display: block;
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(2rem, 6vw, 3rem);
      letter-spacing: 0.08em;
      line-height: 1;
      color: var(--cream);
      background: var(--red);
      border: none;
      padding: 1rem 3.5rem 1.15rem;
      cursor: pointer;
      position: relative;
      box-shadow: 0 8px 0 var(--red-dark), 0 10px 0 rgba(0,0,0,0.2);
      transition: box-shadow 0.08s ease, transform 0.08s ease, background 0.15s ease;
      outline: none;
      user-select: none;
      -webkit-user-select: none;
      border-radius: 3px;
      -webkit-tap-highlight-color: transparent;
    }

    .big-btn::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 2px solid rgba(255,255,255,0.15);
      pointer-events: none;
      border-radius: 1px;
    }

    .big-btn:hover { background: var(--red-hover); }
    .big-btn:focus-visible { outline: 3px solid var(--ink); outline-offset: 4px; }

    .big-btn.pressed {
      box-shadow: 0 2px 0 var(--red-dark), 0 3px 0 rgba(0,0,0,0.2);
      transform: translateY(6px);
    }

    .big-btn.voted { background: #a01818; box-shadow: 0 8px 0 #5a0c0c, 0 10px 0 rgba(0,0,0,0.2); }
    .big-btn.voted:hover { background: #b01a1a; }
    .big-btn.voted.pressed { box-shadow: 0 2px 0 #5a0c0c, 0 3px 0 rgba(0,0,0,0.2); transform: translateY(6px); }

    .thankyou {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.2rem;
      letter-spacing: 0.14em;
      color: var(--red);
      text-align: center;
      opacity: 0;
      transition: opacity 0.25s ease;
      min-height: 1.6rem;
      margin-top: 0.5rem;
    }

    .thankyou.show { opacity: 1; }

    .voted-badge {
      display: none;
      font-family: 'Special Elite', serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #777;
      text-align: center;
      margin-top: 0.4rem;
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    .voted-badge.show { display: inline-block; }

    .counter-block {
      text-align: center;
      border: 3px solid var(--ink);
      padding: 1rem 3rem;
      background: var(--ink);
      margin-top: 1.2rem;
      width: 100%;
    }

    .counter-label {
      font-family: 'Special Elite', serif;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 4px;
    }

    .counter-number {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(3rem, 10vw, 4.5rem);
      color: var(--cream);
      line-height: 1;
      letter-spacing: 0.05em;
      display: block;
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
    }

    .counter-number.bump { transform: scale(1.1); }

    .counter-sub {
      font-family: 'Special Elite', serif;
      font-size: 10px;
      color: #777;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .share-section { margin-top: 1.6rem; width: 100%; }

    .share-label {
      font-family: 'Special Elite', serif;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .share-label::before, .share-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .share-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

    .share-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      padding: 9px 15px;
      cursor: pointer;
      border-radius: 2px;
      color: #fff;
      transition: opacity 0.15s ease, transform 0.1s ease;
      line-height: 1;
    }

    .share-btn:hover  { opacity: 0.85; }
    .share-btn:active { transform: scale(0.96); }
    .share-btn svg { width: 16px; height: 16px; fill: #fff; flex-shrink: 0; }

    .btn-x        { background: #000000; }
    .btn-facebook { background: #1877F2; }
    .btn-whatsapp { background: #25D366; }
    .btn-telegram { background: #2AABEE; }
    .btn-linkedin { background: #0A66C2; }
    .btn-email    { background: #555555; }
    .btn-copy     { background: var(--ink); }

    .copy-confirm {
      font-family: 'Special Elite', serif;
      font-size: 11px;
      color: var(--red);
      text-align: center;
      margin-top: 0.7rem;
      letter-spacing: 0.1em;
      min-height: 1.2rem;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .copy-confirm.show { opacity: 1; }

    .footer {
      margin-top: 2.5rem;
      font-family: 'Special Elite', serif;
      font-size: 10px;
      color: #aaa;
      text-align: center;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      width: 100%;
    }

    /* RTL support for Arabic */
    [dir="rtl"] .share-grid { direction: rtl; }
    [dir="rtl"] .share-label::before { order: 1; }
    [dir="rtl"] .share-label::after  { order: -1; }

    @media (max-width: 420px) {
      .big-btn { padding: 0.9rem 2rem 1rem; }
      .counter-block { padding: 0.8rem 1.5rem; }
      .share-btn { font-size: 12px; padding: 8px 11px; }
      .headline { white-space: normal; font-size: clamp(1.8rem, 8vw, 3rem); }
    }
  </style>

    // ----------------------------------------------------------------
    // SUPABASE CONFIGURATION
    // Replace these two values with your own from Supabase → Settings → API
    // ----------------------------------------------------------------
    const SUPABASE_URL = 'https://yfpbfejzbuhfzmxckbrb.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_66xpZtWNQQt2qaGF9RcFjQ_a3tGd2_7';
    // ----------------------------------------------------------------

    const PAGE_URL    = window.location.href || 'https://stopthewar.world';
    const STORAGE_KEY = 'stw_voted';
    const LANG_KEY    = 'stw_lang';

    let count    = 11349;
    let hasVoted = false;
    let currentLang = 'en';

    const btn        = document.getElementById('mainBtn');
    const numEl      = document.getElementById('counterNum');
    const thankyou   = document.getElementById('thankyou');
    const votedBadge = document.getElementById('votedBadge');
    const bCont      = document.getElementById('butterflyContainer');
    const langSelect = document.getElementById('langSelect');

    // ----------------------------------------------------------------
    // LANGUAGE DETECTION & RENDERING
    // ----------------------------------------------------------------
    function detectLang() {
      // 1. Check saved preference
      try {
        const saved = localStorage.getItem(LANG_KEY);
        if (saved && TRANSLATIONS[saved]) return saved;
      } catch(e) {}

      // 2. Browser language
      const browserLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase().slice(0, 2);
      if (TRANSLATIONS[browserLang]) return browserLang;

      // 3. Try navigator.languages array
      if (navigator.languages) {
        for (const l of navigator.languages) {
          const code = l.toLowerCase().slice(0, 2);
          if (TRANSLATIONS[code]) return code;
        }
      }

      return 'en';
    }

    function applyLang(lang) {
      const t = TRANSLATIONS[lang] || TRANSLATIONS.en;
      currentLang = lang;

      document.documentElement.lang = lang;
      document.documentElement.dir  = t.dir;

      document.getElementById('t-masthead').textContent     = t.masthead;
      document.getElementById('t-headline').innerHTML       = t.headline;
      document.getElementById('t-subhead').innerHTML        = t.subhead;
      btn.textContent                                        = t.btn;
      document.getElementById('t-counter-label').textContent = t.counterLabel;
      document.getElementById('t-counter-sub').textContent  = t.counterSub;
      document.getElementById('t-share-label').textContent  = t.shareLabel;
      document.getElementById('t-copy-btn').textContent     = t.copyBtn;
      document.getElementById('t-footer').textContent       = t.footer;
      document.getElementById('copyConfirm').textContent    = t.copyConfirm;

      // Update voted badge if showing
      votedBadge.textContent = t.votedBadge;

      // Keep counter number visible
      numEl.textContent = formatNum(count);

      // Sync dropdown
      langSelect.value = lang;
    }

    function setLang(lang) {
      try { localStorage.setItem(LANG_KEY, lang); } catch(e) {}
      applyLang(lang);
    }

    // ----------------------------------------------------------------
    // SUPABASE
    // ----------------------------------------------------------------
    async function loadCount() {
      try {
        const res  = await fetch(`${SUPABASE_URL}/rest/v1/counter?id=eq.1&select=count`, {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        const data = await res.json();
        if (data && data[0]) {
          count = data[0].count;
          numEl.textContent = formatNum(count);
        }
      } catch(e) {}
    }

    async function incrementCount() {
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/rpc/increment_counter`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
          }
        });
      } catch(e) {}
    }

    // ----------------------------------------------------------------
    // BUTTERFLIES
    // ----------------------------------------------------------------
    const COLOURS = [
      ['#7EC8E3','#5BA8C4'],['#F4A460','#D4813A'],['#98D4A3','#6CB87A'],
      ['#D4A5D4','#B07AB0'],['#F7C59F','#E8A070'],['#A8D8EA','#78B8D0'],
      ['#FFB7C5','#E8889A'],
    ];

    function makeButterflyHTML(c1, c2) {
      return `<svg viewBox="0 0 40 32" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="12" cy="10" rx="11" ry="8" fill="${c1}" opacity="0.9"/>
        <ellipse cx="10" cy="22" rx="8"  ry="6" fill="${c2}" opacity="0.85"/>
        <ellipse cx="28" cy="10" rx="11" ry="8" fill="${c1}" opacity="0.9"/>
        <ellipse cx="30" cy="22" rx="8"  ry="6" fill="${c2}" opacity="0.85"/>
        <ellipse cx="20" cy="16" rx="2"  ry="9" fill="#3a2a1a" opacity="0.7"/>
        <line x1="20" y1="7" x2="14" y2="1" stroke="#3a2a1a" stroke-width="0.8" opacity="0.6"/>
        <line x1="20" y1="7" x2="26" y2="1" stroke="#3a2a1a" stroke-width="0.8" opacity="0.6"/>
        <circle cx="14" cy="1" r="1" fill="#3a2a1a" opacity="0.6"/>
        <circle cx="26" cy="1" r="1" fill="#3a2a1a" opacity="0.6"/>
      </svg>`;
    }

    function spawnButterflies(ox, oy) {
      const total = 10 + Math.floor(Math.random() * 6);
      for (let i = 0; i < total; i++) {
        setTimeout(() => {
          const b = document.createElement('div');
          b.className = 'butterfly';
          const angle = (Math.random() * 320) - 160;
          const dist  = 120 + Math.random() * 200;
          const dx    = Math.sin(angle * Math.PI / 180) * dist;
          const dy    = -(80 + Math.random() * 180);
          const rot   = (Math.random() - 0.5) * 30;
          const rot2  = rot + (Math.random() - 0.5) * 40;
          const dur   = (1.4 + Math.random() * 1.2).toFixed(2);
          const flap  = (0.18 + Math.random() * 0.18).toFixed(2);
          const col   = COLOURS[Math.floor(Math.random() * COLOURS.length)];
          const size  = 22 + Math.floor(Math.random() * 16);
          b.style.cssText = `left:${ox-size/2}px;top:${oy-size/2}px;width:${size}px;height:${size}px;--dur:${dur}s;--flap:${flap}s;--dx:${dx}px;--dy:${dy}px;--rot:${rot}deg;--rot2:${rot2}deg;`;
          b.innerHTML = makeButterflyHTML(col[0], col[1]);
          bCont.appendChild(b);
          setTimeout(() => b.remove(), parseFloat(dur) * 1000 + 200);
        }, i * 55);
      }
    }

    function playChime() {
      try {
        const audio = new AudioContext();
        [523, 659, 784].forEach((freq, i) => {
          const osc = audio.createOscillator(), gain = audio.createGain();
          osc.type = 'sine';
          osc.connect(gain); gain.connect(audio.destination);
          osc.frequency.value = freq;
          const t = audio.currentTime + i * 0.09;
          gain.gain.setValueAtTime(0, t);
          gain.gain.linearRampToValueAtTime(0.15, t + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
          osc.start(t); osc.stop(t + 0.55);
        });
      } catch(e) {}
    }

    function flashMessage(msg) {
      thankyou.textContent = msg;
      thankyou.classList.add('show');
      setTimeout(() => thankyou.classList.remove('show'), 2400);
    }

    function formatNum(n) { return n.toLocaleString('en-GB'); }

    // ----------------------------------------------------------------
    // BUTTON CLICK
    // ----------------------------------------------------------------
    btn.addEventListener('click', function() {
      btn.classList.add('pressed');
      setTimeout(() => btn.classList.remove('pressed'), 130);

      const rect  = btn.getBoundingClientRect();
      const cRect = bCont.getBoundingClientRect();
      spawnButterflies(rect.left + rect.width/2 - cRect.left, rect.top + rect.height/2 - cRect.top);
      playChime();

      const t = TRANSLATIONS[currentLang] || TRANSLATIONS.en;

      if (!hasVoted) {
        count++;
        hasVoted = true;
        try { localStorage.setItem(STORAGE_KEY, '1'); } catch(e) {}
        numEl.textContent = formatNum(count);
        numEl.classList.add('bump');
        setTimeout(() => numEl.classList.remove('bump'), 200);
        incrementCount();
        btn.classList.add('voted');
        flashMessage(t.votedFirst);
        setTimeout(() => votedBadge.classList.add('show'), 2600);
      } else {
        flashMessage(t.votedRepeat);
      }
    });

    // ----------------------------------------------------------------
    // SHARE FUNCTIONS
    // ----------------------------------------------------------------
    function getShareMsg() {
      return (TRANSLATIONS[currentLang] || TRANSLATIONS.en).shareMsg;
    }
    function getEmailSubject() {
      return (TRANSLATIONS[currentLang] || TRANSLATIONS.en).emailSubject;
    }

    function shareX()        { window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(getShareMsg() + ' ' + PAGE_URL), '_blank'); }
    function shareFacebook() { window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(PAGE_URL) + '&quote=' + encodeURIComponent(getShareMsg()), '_blank'); }
    function shareWhatsApp() { window.open('https://wa.me/?text=' + encodeURIComponent(getShareMsg() + ' ' + PAGE_URL), '_blank'); }
    function shareTelegram() { window.open('https://t.me/share/url?url=' + encodeURIComponent(PAGE_URL) + '&text=' + encodeURIComponent(getShareMsg()), '_blank'); }
    function shareLinkedIn() { window.open('https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(PAGE_URL), '_blank'); }
    function shareEmail()    { window.open('mailto:?subject=' + encodeURIComponent(getEmailSubject()) + '&body=' + encodeURIComponent(getShareMsg() + '\n\n' + PAGE_URL)); }

    function copyLink() {
      const text = getShareMsg() + ' ' + PAGE_URL;
      navigator.clipboard.writeText(text).then(showCopyConfirm).catch(() => {
        const el = document.createElement('textarea');
        el.value = text; document.body.appendChild(el); el.select();
        document.execCommand('copy'); document.body.removeChild(el);
        showCopyConfirm();
      });
    }

    function showCopyConfirm() {
      const el = document.getElementById('copyConfirm');
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3500);
    }

    // ----------------------------------------------------------------
    // INIT
    // ----------------------------------------------------------------
    try { hasVoted = !!localStorage.getItem(STORAGE_KEY); } catch(e) {}

    const lang = detectLang();
    applyLang(lang);

    if (hasVoted) {
      btn.classList.add('voted');
      votedBadge.classList.add('show');
    }

    loadCount();
  </script>
